services:
  postgres:
    image: postgres:15-alpine
    container_name: ticket_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ticket_booking
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ticket_redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ticket_backend
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/ticket_booking
      DIRECT_URL: postgresql://postgres:password@postgres:5432/ticket_booking
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_secret
      RAZORPAY_KEY_ID: test_key
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-test_secret}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-mock}
      PORT: 5001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "5001:5001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5001
        NEXT_PUBLIC_WS_URL: http://localhost:5001
    container_name: ticket_frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
