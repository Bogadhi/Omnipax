version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: ticket_postgres_prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ticket_booking
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # SECURITY: No ports exposed to host
    networks:
      - internal_net

  redis:
    image: redis:7-alpine
    container_name: ticket_redis_prod
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # SECURITY: No ports exposed to host
    networks:
      - internal_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: ticket_backend_prod
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      # Construct DB URL from individual vars if needed, or rely on .env.production having it full.
      # Assuming .env.production has the full URL or individual parts.
      # For safety, we keep specific overrides here if they rely on service names
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/ticket_booking
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      # Other sensitive vars are picked up from env_file

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - internal_net

  nginx:
    image: nginx:latest
    container_name: ticket_nginx_prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      # CERTBOT: Mapping from HOST
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - internal_net

volumes:
  postgres_data:
  redis_data:

networks:
  internal_net:
    driver: bridge
